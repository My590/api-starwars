<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title> Aula API</title>
    
</head>
<body>
    <header>
        <h1> Star Wars WIKI</h1>
        <p> Personagens do filme</p>
    </header>
       
    <main>
        <h2> Personagens</h2>
        <div class="cards-container" id="cardsContainer"> </div>
    </main>
      
    <footer>
        <p> Site desenvolvido em WEB III pelo 3º B - div B</p>
    </footer>
    
    <script> 
    async function carregarPersonagens() {
        const container = document.getElementById("cardsContainer")
        container.innerHTML = "<p> Carregando...</p>"

        try {
            const resposta = await fetch ("https://akabab.github.io/starwars-api/api/all.json")
            const personagens = await resposta.json()

            container.innerHTML = " "

            personagens.forEach(personagem => {
                const card = document.createElement("div")
                card.classList.add("card")

                card.innerHTML = `
                <img src= "${personagem.image}">
                
                <div class= "card-content">
                <h3> ${personagem.name}</h3>   
                <p><strong> Espécie:</strong> ${personagem.species || "Desconhecida"} </p>
                <p><strong> Género:</strong> ${personagem.gender || "Desconhecido"} </p>
                <p><strong> Altura:</strong> ${personagem.height || "Desconhecido"} </p>
                <p><strong> Mundo:</strong> ${personagem.homeworld ||"Desconhecido"} </p>
                </div>
                `

                container.appendChild(card) 
            });
        }

        catch(erro) {
            container.innerHTML = "<p> Não foi possivel acessar os dados </p>"
            console.error(erro)
        }
    }
    
    document.addEventListener("DOMContentLoaded", ()=>{carregarPersonagens()})
    </script>
</body>
</html>
